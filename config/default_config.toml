# Pi Connect Speaker configuration
# Managed by the web UI. Edit carefully if changing by hand.

[device]
name = "PiConnect Speaker"
append_hostname = false
type = "speaker"
timezone = "Etc/UTC"
language = "en"

[web]
host = "0.0.0.0"
port = 8080
auth_mode = "none"
auth_pin = ""
theme = "system"

[audio]
backend = "alsa"
device_selection = "auto"
device = "default"
fallback = "wait"
mixer = "softvol"
alsa_mixer_control = "PCM"
alsa_mixer_device = "default"
alsa_mixer_index = 0
format = "S16"
dither = "tpdf"

[volume]
startup_volume_percent = 40
volume_control = "log"
volume_range_db = 60
normalisation_enabled = true
normalisation_method = "dynamic"
normalisation_gain_type = "auto"
normalisation_pregain_db = 0.0
normalisation_threshold_dbfs = -2.0

[quality]
bitrate_kbps = 320
cache_enabled = true
cache_path = "/var/cache/pi-connect-speaker/audio"
system_cache_path = "/var/cache/pi-connect-speaker/system"
cache_size_limit = "512M"
gapless_enabled = true
autoplay_enabled = true

[network]
wait_for_network = true
interface = "wlan0"
connectivity_host = "1.1.1.1"
restart_after_offline_seconds = 60
retry_interval_seconds = 5

[stability]
buffer_preset = "stable"
command_timeout_seconds = 10
health_check_interval_seconds = 20
watchdog_enabled = false
require_audio_device_before_start = false

[service]
librespot_path = "librespot"
spotify_service_name = "pi-connect-speaker-librespot.service"
web_service_name = "pi-connect-speaker.service"
autostart = true
log_level = "info"
zeroconf_backend = "auto"
zeroconf_port = 0
zeroconf_interface = ""

[diagnostics]
log_lines = 200
auto_refresh_seconds = 10
test_sound_command = "speaker-test"
test_sound_duration_seconds = 2
test_sound_frequency_hz = 440
show_command_preview = true

[backup]
enabled = true
directory = "/etc/pi-connect-speaker/backups"
keep_last = 20

[profiles]
directory = "/etc/pi-connect-speaker/profiles"

[librespot]
enable_oauth = false
oauth_port = 0
access_token = ""
username = ""
extra_args = []
